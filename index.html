<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Site</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">NewsSite</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0" id="topic-buttons">
                    <li class="nav-item"><button class="btn btn-link nav-link topic-btn" data-topic="general">General</button></li>
                    <li class="nav-item"><button class="btn btn-link nav-link topic-btn" data-topic="business">Business</button></li>
                    <li class="nav-item"><button class="btn btn-link nav-link topic-btn" data-topic="technology">Technology</button></li>
                    <li class="nav-item"><button class="btn btn-link nav-link topic-btn" data-topic="sports">Sports</button></li>
                    <li class="nav-item"><button class="btn btn-link nav-link topic-btn" data-topic="science">Science</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4" id="news-cards">
        <div class="row" id="cards-row">
        </div>
    </div>

    <div class="container mt-4 text-center mb-5">
        <button class="btn btn-primary btn-lg" id="load-more-btn">Load More</button>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>

</html>
